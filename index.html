<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DRIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0010;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    touch-action: none;
    user-select: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  #hud {
    position: fixed;
    top: 20px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    pointer-events: none;
  }
  .hud-item {
    color: #ff2adf;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 8px #ff2adf, 0 0 20px #ff2adf, 0 0 40px #ff00cc;
    letter-spacing: 2px;
  }
  .lives-display { color: #00ffff; text-shadow: 0 0 8px #00ffff, 0 0 20px #00ffff, 0 0 40px #0088ff; }

  #title-screen, #gameover-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    background: rgba(0,0,0,0);
  }
  #gameover-screen { display: none; }

  .screen-title {
    font-size: clamp(42px, 10vw, 96px);
    font-weight: 900;
    color: #ff2adf;
    text-shadow:
      0 0 10px #ff2adf,
      0 0 30px #ff2adf,
      0 0 60px #ff00cc,
      0 0 100px #ff00cc,
      0 0 160px #cc00aa;
    letter-spacing: 8px;
    margin-bottom: 16px;
    animation: titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { opacity: 1; filter: brightness(1); }
    50% { opacity: 0.85; filter: brightness(1.3); }
  }
  .screen-subtitle {
    font-size: clamp(12px, 2.5vw, 18px);
    color: #00ffff;
    text-shadow: 0 0 6px #00ffff, 0 0 18px #00ffff;
    letter-spacing: 4px;
    margin-bottom: 50px;
  }
  .instructions {
    color: #cc88ff;
    font-size: clamp(11px, 2vw, 15px);
    line-height: 2.2;
    text-align: center;
    text-shadow: 0 0 6px #aa44ff;
    margin-bottom: 50px;
    letter-spacing: 1px;
  }
  .neon-btn {
    background: transparent;
    border: 2px solid #ff2adf;
    color: #ff2adf;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(14px, 3vw, 22px);
    font-weight: bold;
    letter-spacing: 6px;
    padding: 14px 50px;
    cursor: pointer;
    text-shadow: 0 0 8px #ff2adf, 0 0 20px #ff2adf;
    box-shadow: 0 0 10px #ff2adf, 0 0 30px #ff00cc, inset 0 0 10px rgba(255,42,223,0.1);
    transition: all 0.2s;
    pointer-events: all;
    animation: btnPulse 1.5s ease-in-out infinite;
  }
  .neon-btn:hover {
    background: rgba(255,42,223,0.15);
    box-shadow: 0 0 20px #ff2adf, 0 0 60px #ff00cc, inset 0 0 20px rgba(255,42,223,0.2);
    transform: scale(1.05);
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 10px #ff2adf, 0 0 30px #ff00cc, inset 0 0 10px rgba(255,42,223,0.1); }
    50% { box-shadow: 0 0 20px #ff2adf, 0 0 50px #ff00cc, 0 0 80px #cc0088, inset 0 0 15px rgba(255,42,223,0.2); }
  }
  .score-display {
    color: #ff2adf;
    font-size: clamp(16px, 4vw, 32px);
    text-shadow: 0 0 10px #ff2adf, 0 0 30px #ff00cc;
    margin-bottom: 12px;
    letter-spacing: 4px;
  }
  .best-display {
    color: #00ffff;
    font-size: clamp(13px, 3vw, 22px);
    text-shadow: 0 0 8px #00ffff, 0 0 20px #00ffff;
    margin-bottom: 40px;
    letter-spacing: 4px;
  }
  .gameover-title {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: #ff4444;
    text-shadow: 0 0 10px #ff4444, 0 0 30px #ff0000, 0 0 70px #cc0000;
    letter-spacing: 6px;
    margin-bottom: 30px;
    animation: titlePulse 1.5s ease-in-out infinite;
  }
  #hit-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,0,0,0);
    pointer-events: none;
    transition: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hit-flash"></div>
<div id="hud" style="display:none">
  <div class="hud-item" id="score-hud">SCORE: 0</div>
  <div class="hud-item lives-display" id="lives-hud">♥ ♥ ♥</div>
  <div class="hud-item" id="best-hud">BEST: 0</div>
</div>
<div id="title-screen">
  <div class="screen-title">NEON DRIFT</div>
  <div class="screen-subtitle">— SYNTHWAVE SURVIVAL —</div>
  <div class="instructions">
    ← → ARROW KEYS &nbsp;|&nbsp; A / D &nbsp;|&nbsp; TOUCH DRAG<br>
    DODGE THE INCOMING CUBES<br>
    3 LIVES &nbsp;|&nbsp; SPEED INCREASES EVERY 500 PTS<br>
    SURVIVE AS LONG AS YOU CAN
  </div>
  <button class="neon-btn" id="start-btn">START</button>
</div>
<div id="gameover-screen">
  <div class="gameover-title">GAME OVER</div>
  <div class="score-display" id="final-score">SCORE: 0</div>
  <div class="best-display" id="final-best">BEST: 0</div>
  <button class="neon-btn" id="restart-btn">PLAY AGAIN</button>
</div>

<script>
(function() {
'use strict';

// ── Canvas setup ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const HUD = document.getElementById('hud');
const titleScreen = document.getElementById('title-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const hitFlash = document.getElementById('hit-flash');

let W, H, HORIZON, LANE_COUNT, LANE_W, PLAYER_Y;
const LANES = 5;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  HORIZON = H * 0.42;
  LANE_COUNT = LANES;
  LANE_W = W / LANE_COUNT;
  PLAYER_Y = H * 0.82;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── State ─────────────────────────────────────────────────────
let state = 'title'; // title | playing | gameover
let score = 0, lives = 3, bestScore = 0;
let baseSpeed = 1.5, gameTime = 0;
let invincible = false, invincibleTimer = 0;
const INV_DURATION = 2200;

// Player
let playerX;
let playerTargetX;
const PLAYER_W = W * 0.06;

// Obstacles
let obstacles = [];
let obstacleTimer = 0;
let obstacleInterval = 90;

// Particles
let particles = [];

// Stars
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * HORIZON * 0.95,
      size: Math.random() * 2.2 + 0.3,
      speed: Math.random() * 0.18 + 0.04,
      bright: Math.random(),
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

// Touch
let touchStartX = null;

// ── Helpers ───────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function getLivesStr(n) {
  const on = '♥', off = '♡';
  let s = '';
  for (let i = 0; i < 3; i++) s += (i < n ? on : off) + (i < 2 ? ' ' : '');
  return s;
}

function getSpeed() {
  const tier = Math.floor(score / 500);
  return baseSpeed * (1 + tier * 0.28);
}

function getObstacleInterval() {
  const tier = Math.floor(score / 500);
  return Math.max(40, obstacleInterval - tier * 8);
}

// ── Grid perspective ──────────────────────────────────────────
function perspectiveX(screenX, depth) {
  // depth: 0=horizon, 1=near edge
  const vx = W / 2;
  return vx + (screenX - vx) * depth;
}

function perspectiveY(depth) {
  return HORIZON + (H - HORIZON) * depth;
}

function depthFromZ(z) {
  // z: 0=far(horizon), 1=near(player)
  return Math.pow(z, 0.82);
}

// ── Draw sky gradient ─────────────────────────────────────────
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, HORIZON);
  grad.addColorStop(0, '#0a0018');
  grad.addColorStop(0.45, '#1a0035');
  grad.addColorStop(0.75, '#2a0050');
  grad.addColorStop(1, '#3d0070');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, HORIZON);
}

// ── Draw stars ────────────────────────────────────────────────
function drawStars(ts) {
  for (let s of stars) {
    s.x -= s.speed;
    if (s.x < 0) { s.x = W; s.y = Math.random() * HORIZON * 0.95; }
    const twinkle = 0.55 + 0.45 * Math.sin(ts * 0.002 + s.twinkleOffset);
    const alpha = twinkle;
    ctx.save();
    ctx.globalAlpha = alpha;
    if (s.size > 1.5) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 5;
    }
    ctx.fillStyle = `hsl(${220 + s.bright*80}, 80%, ${70 + s.bright*30}%)`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Draw sun ──────────────────────────────────────────────────
function drawSun(ts) {
  const cx = W * 0.5, cy = HORIZON;
  // Outer glow rings
  const rings = [
    { r: 80, color: 'rgba(255,80,200,0.08)' },
    { r: 60, color: 'rgba(255,60,180,0.13)' },
    { r: 45, color: 'rgba(255,80,200,0.18)' },
  ];
  for (let rg of rings) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rg.r * (W/800));
    g.addColorStop(0, 'rgba(255,120,220,0.7)');
    g.addColorStop(0.5, rg.color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, rg.r * (W/800), 0, Math.PI * 2);
    ctx.fill();
  }
  // Sun disc with horizontal stripes
  const R = 32 * (W / 800);
  const sunGrad = ctx.createLinearGradient(cx, cy - R, cx, cy + R);
  sunGrad.addColorStop(0, '#ff80d4');
  sunGrad.addColorStop(0.5, '#ff40b0');
  sunGrad.addColorStop(1, '#cc0088');
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = sunGrad;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
  // Stripes (lower half)
  ctx.fillStyle = '#1a0035';
  const stripeCount = 6;
  for (let i = 0; i < stripeCount; i++) {
    const stripeFrac = (i + 1) / (stripeCount + 1);
    const sy = cy + stripeFrac * R;
    const h = Math.max(1.5, (R / (stripeCount + 2)) * (1 - stripeFrac * 0.5));
    ctx.fillRect(cx - R, sy, R * 2, h);
  }
  ctx.restore();
}

// ── Draw ground / grid ────────────────────────────────────────
function drawGround(ts) {
  // Ground fill
  const gGrad = ctx.createLinearGradient(0, HORIZON, 0, H);
  gGrad.addColorStop(0, '#0e0025');
  gGrad.addColorStop(0.5, '#080015');
  gGrad.addColorStop(1, '#04000e');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, HORIZON, W, H - HORIZON);

  const gridSpeed = getSpeed();
  const scrollFrac = (gameTime * gridSpeed * 0.012) % 1;

  // Horizontal lines (pink)
  const LINE_COUNT = 16;
  ctx.save();
  for (let i = 0; i <= LINE_COUNT; i++) {
    const t = (i / LINE_COUNT + scrollFrac) % 1;
    const depth = depthFromZ(t);
    const y = perspectiveY(depth);
    if (y < HORIZON || y > H) continue;
    const alpha = clamp(depth * 1.4, 0, 1);
    const width = clamp(depth * 2.5, 0.3, 3);
    ctx.strokeStyle = `rgba(255,50,180,${alpha * 0.85})`;
    ctx.lineWidth = width;
    ctx.shadowColor = '#ff30aa';
    ctx.shadowBlur = clamp(depth * 12, 0, 14);
    ctx.beginPath();
    ctx.moveTo(perspectiveX(0, depth), y);
    ctx.lineTo(perspectiveX(W, depth), y);
    ctx.stroke();
  }
  ctx.restore();

  // Vertical lane lines (cyan)
  ctx.save();
  for (let col = 0; col <= LANE_COUNT; col++) {
    const sx = col * LANE_W;
    ctx.strokeStyle = 'rgba(0,220,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#00ddff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(perspectiveX(sx, 0.01), HORIZON);
    ctx.lineTo(sx, H);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Draw player ship ──────────────────────────────────────────
function drawShip(ts) {
  const cx = playerX;
  const cy = PLAYER_Y;
  const sc = clamp(W / 800, 0.5, 1.6);
  const pw = 38 * sc;
  const ph = 52 * sc;

  ctx.save();
  ctx.translate(cx, cy);

  // Engine flame (animated)
  const flameFlicker = 0.7 + 0.3 * Math.sin(ts * 0.018);
  const fh = ph * 0.55 * flameFlicker;
  const flameGrad = ctx.createLinearGradient(0, 0, 0, fh);
  flameGrad.addColorStop(0, 'rgba(255,140,255,0.9)');
  flameGrad.addColorStop(0.4, 'rgba(200,0,255,0.7)');
  flameGrad.addColorStop(1, 'rgba(100,0,200,0)');
  ctx.fillStyle = flameGrad;
  ctx.shadowColor = '#dd00ff';
  ctx.shadowBlur = 22 * flameFlicker;
  ctx.beginPath();
  ctx.moveTo(-pw * 0.22, ph * 0.3);
  ctx.lineTo(0, ph * 0.3 + fh);
  ctx.lineTo(pw * 0.22, ph * 0.3);
  ctx.closePath();
  ctx.fill();

  // Invincibility blink
  if (invincible) {
    const blink = Math.sin(ts * 0.03) > 0;
    ctx.globalAlpha = blink ? 0.4 : 0.95;
  }

  // Ship body (magenta/pink)
  ctx.shadowColor = '#ff00cc';
  ctx.shadowBlur = 24;

  // Main fuselage
  const bodyGrad = ctx.createLinearGradient(-pw * 0.5, -ph * 0.5, pw * 0.5, ph * 0.5);
  bodyGrad.addColorStop(0, '#ff88ee');
  bodyGrad.addColorStop(0.4, '#dd00aa');
  bodyGrad.addColorStop(1, '#880066');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -ph * 0.5);            // nose
  ctx.lineTo(pw * 0.38, ph * 0.1);     // right shoulder
  ctx.lineTo(pw * 0.5, ph * 0.28);     // right wing tip outer
  ctx.lineTo(pw * 0.22, ph * 0.32);    // right wing inner
  ctx.lineTo(pw * 0.18, ph * 0.5);     // right tail
  ctx.lineTo(-pw * 0.18, ph * 0.5);    // left tail
  ctx.lineTo(-pw * 0.22, ph * 0.32);   // left wing inner
  ctx.lineTo(-pw * 0.5, ph * 0.28);    // left wing tip outer
  ctx.lineTo(-pw * 0.38, ph * 0.1);    // left shoulder
  ctx.closePath();
  ctx.fill();

  // Cockpit
  const cockpitGrad = ctx.createRadialGradient(0, -ph * 0.15, 1, 0, -ph * 0.15, pw * 0.18);
  cockpitGrad.addColorStop(0, 'rgba(180,255,255,0.9)');
  cockpitGrad.addColorStop(1, 'rgba(0,200,255,0.3)');
  ctx.fillStyle = cockpitGrad;
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.ellipse(0, -ph * 0.12, pw * 0.15, ph * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing edge glow lines
  ctx.strokeStyle = '#ff40cc';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#ff40cc';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(pw * 0.22, ph * 0.28);
  ctx.lineTo(pw * 0.5, ph * 0.28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-pw * 0.22, ph * 0.28);
  ctx.lineTo(-pw * 0.5, ph * 0.28);
  ctx.stroke();

  ctx.restore();
}

// ── Obstacles ─────────────────────────────────────────────────
function spawnObstacle() {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  // Place in center of lane
  const laneX = (lane + 0.5) * LANE_W;
  obstacles.push({ lane, laneX, z: 0, hit: false });
}

function getObstacleScreenPos(ob) {
  const depth = depthFromZ(ob.z);
  const sx = perspectiveX(ob.laneX, depth);
  const sy = perspectiveY(depth);
  const size = Math.max(8, 100 * depth * (W / 700));
  return { sx, sy, size, depth };
}

function drawCube(sx, sy, size, depth, ts) {
  const alpha = clamp(depth * 1.5, 0.1, 1);
  const s = size;
  // Wireframe cube: front face + back face + connecting edges
  const d = s * 0.45; // depth offset
  const dx = d * 0.6, dy = -d * 0.55;

  // Front face corners
  const f = [
    [sx - s/2, sy - s/2],
    [sx + s/2, sy - s/2],
    [sx + s/2, sy + s/2],
    [sx - s/2, sy + s/2],
  ];
  // Back face corners (offset)
  const b = f.map(([x, y]) => [x + dx, y + dy]);

  ctx.save();
  ctx.strokeStyle = `rgba(0,255,220,${alpha})`;
  ctx.lineWidth = clamp(depth * 3.5, 0.8, 3);
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 18 * depth;

  // Back face
  ctx.beginPath();
  ctx.moveTo(b[0][0], b[0][1]);
  for (let i = 1; i < 4; i++) ctx.lineTo(b[i][0], b[i][1]);
  ctx.closePath();
  ctx.globalAlpha = alpha * 0.5;
  ctx.stroke();

  // Front face
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(f[0][0], f[0][1]);
  for (let i = 1; i < 4; i++) ctx.lineTo(f[i][0], f[i][1]);
  ctx.closePath();
  ctx.stroke();

  // Connecting edges
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(f[i][0], f[i][1]);
    ctx.lineTo(b[i][0], b[i][1]);
    ctx.globalAlpha = alpha * 0.7;
    ctx.stroke();
  }

  // Inner glow fill
  ctx.globalAlpha = alpha * 0.08;
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath();
  ctx.moveTo(f[0][0], f[0][1]);
  for (let i = 1; i < 4; i++) ctx.lineTo(f[i][0], f[i][1]);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────
function spawnExplosion(x, y) {
  const colors = ['#ff2adf', '#00ffff', '#ff8800', '#ffffff', '#ff0066', '#9900ff'];
  for (let i = 0; i < 48; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: Math.random() * 0.025 + 0.015,
      size: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      trail: []
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (let p of particles) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 5) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.97;
    p.life -= p.decay;
  }
}

function drawParticles() {
  for (let p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    if (p.trail.length > 1) {
      ctx.globalAlpha = p.life * 0.4;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size * 0.5;
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t of p.trail) ctx.lineTo(t.x, t.y);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Collision ─────────────────────────────────────────────────
function checkCollisions() {
  if (invincible) return;
  const sc = clamp(W / 800, 0.5, 1.6);
  const pw = 32 * sc;
  const ph = 42 * sc;

  for (let ob of obstacles) {
    if (ob.hit) continue;
    const { sx, sy, size } = getObstacleScreenPos(ob);
    // Simple AABB, slightly forgiving
    const dx = Math.abs(sx - playerX);
    const dy = Math.abs(sy - PLAYER_Y);
    if (dx < (pw * 0.7 + size * 0.38) && dy < (ph * 0.55 + size * 0.38)) {
      ob.hit = true;
      takeDamage(sx, sy);
    }
  }
}

function takeDamage(ex, ey) {
  lives--;
  spawnExplosion(ex || playerX, ey || PLAYER_Y);
  invincible = true;
  invincibleTimer = INV_DURATION;
  // Flash red
  hitFlash.style.background = 'rgba(255,0,60,0.55)';
  hitFlash.style.transition = 'none';
  setTimeout(() => {
    hitFlash.style.transition = 'background 0.5s';
    hitFlash.style.background = 'rgba(255,0,0,0)';
  }, 60);
  updateHUD();
  if (lives <= 0) {
    setTimeout(() => endGame(), 600);
  }
}

// ── HUD ───────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-hud').textContent = `SCORE: ${score}`;
  document.getElementById('lives-hud').textContent = getLivesStr(lives);
  document.getElementById('best-hud').textContent = `BEST: ${bestScore}`;
}

// ── Input ──────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing' || touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  playerTargetX = clamp(playerTargetX + dx * 0.7, LANE_W * 0.5, W - LANE_W * 0.5);
  touchStartX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  touchStartX = null;
});

function handleInput() {
  const speed = W * 0.012;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
    playerTargetX -= speed;
  }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    playerTargetX += speed;
  }
  playerTargetX = clamp(playerTargetX, LANE_W * 0.5, W - LANE_W * 0.5);
}

// ── Game flow ──────────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  gameTime = 0;
  obstacles = [];
  particles = [];
  obstacleTimer = 0;
  invincible = false;
  invincibleTimer = 0;
  playerX = W / 2;
  playerTargetX = W / 2;
  titleScreen.style.display = 'none';
  gameoverScreen.style.display = 'none';
  HUD.style.display = 'flex';
  initStars();
  updateHUD();
}

function endGame() {
  state = 'gameover';
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('neonDriftBest', bestScore); } catch(e) {}
  }
  HUD.style.display = 'none';
  document.getElementById('final-score').textContent = `SCORE: ${score}`;
  document.getElementById('final-best').textContent = `BEST: ${bestScore}`;
  gameoverScreen.style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    if (state === 'title') startGame();
    else if (state === 'gameover') startGame();
  }
});

// Load best score
try {
  const saved = localStorage.getItem('neonDriftBest');
  if (saved) bestScore = parseInt(saved) || 0;
} catch(e) {}

// ── Main game loop ─────────────────────────────────────────────
let lastTs = 0;
initStars();

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Always draw background
  drawSky();
  drawStars(ts);
  drawSun(ts);
  drawGround(ts);

  if (state === 'playing') {
    gameTime += dt;
    score = Math.floor(gameTime / 80);
    updateHUD();

    // Invincibility countdown
    if (invincible) {
      invincibleTimer -= dt;
      if (invincibleTimer <= 0) { invincible = false; invincibleTimer = 0; }
    }

    // Input
    handleInput();
    playerX = lerp(playerX, playerTargetX, 0.13);

    // Spawn obstacles
    obstacleTimer++;
    if (obstacleTimer >= getObstacleInterval()) {
      obstacleTimer = 0;
      spawnObstacle();
    }

    // Update obstacles
    const spd = getSpeed();
    obstacles = obstacles.filter(ob => ob.z < 1.02);
    for (let ob of obstacles) {
      ob.z += 0.0085 * spd;
    }

    // Update laneX for player lane width (handle resize)
    for (let ob of obstacles) {
      ob.laneX = (ob.lane + 0.5) * LANE_W;
    }

    // Draw obstacles (back to front)
    const sorted = [...obstacles].sort((a, b) => a.z - b.z);
    for (let ob of sorted) {
      if (ob.z < 0.01) continue;
      const { sx, sy, size, depth } = getObstacleScreenPos(ob);
      drawCube(sx, sy, size, depth, ts);
    }

    // Collision
    checkCollisions();

    // Particles
    updateParticles();
    drawParticles();

    // Draw ship
    if (lives > 0) drawShip(ts);

  } else if (state === 'title' || state === 'gameover') {
    // Animate some particles on idle screens
    updateParticles();
    drawParticles();
  }
}

requestAnimationFrame(loop);

})();
</script>
