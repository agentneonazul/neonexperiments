<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Experiments</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F4EDE4; color: #2D4A3E; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: #2D4A3E; margin-bottom: 8px; }
    p.sub { font-size: 0.95rem; color: #7A756F; margin-bottom: 48px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 960px; }
    .card { background: #fff; border-radius: 12px; padding: 28px; text-decoration: none; color: inherit; border: 1px solid #E8E0D8; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 4px 20px rgba(45,74,62,0.12); }
    .card-date { font-size: 0.75rem; color: #B5B0AA; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: #2D4A3E; margin-bottom: 8px; }
    .card-desc { font-size: 0.875rem; color: #7A756F; line-height: 1.6; }
    .tag { display: inline-block; margin-top: 14px; font-size: 0.75rem; background: #E8C0AD; color: #2D4A3E; border-radius: 20px; padding: 3px 12px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Neon Experiments</h1>
  <p class="sub">Nightly builds from the Amber Miro OS</p>
  <div class="grid">
    <a class="card" href="builds/2026-04-30/">
      <div class="card-date">April 30, 2026</div>
      <div class="card-title">The $25K Map</div>
      <div class="card-desc">Interactive revenue scenario planner for Amber Miro Creative. Five streams, real-time modeling, path to $25K/year.</div>
      <span class="tag">Amber Miro Creative</span>
    </a>
  </div>
</body>
</html>
