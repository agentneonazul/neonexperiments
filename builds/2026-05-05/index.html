<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DRIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0014;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ─── Sizing ────────────────────────────────────────────────────────────────
  let W, H;
  function resize() {
    const maxW = 480, maxH = 800;
    const ratio = Math.min(window.innerWidth / maxW, window.innerHeight / maxH);
    W = canvas.width  = Math.floor(maxW * ratio);
    H = canvas.height = Math.floor(maxH * ratio);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    SCALE = W / 480;
  }
  let SCALE = 1;
  window.addEventListener('resize', () => { resize(); if (state !== 'play') drawTitle(); });

  // ─── Palette ───────────────────────────────────────────────────────────────
  const C = {
    bg:      '#0a0014',
    grid:    '#2a0050',
    gridBrt: '#6a00c8',
    pink:    '#ff2d78',
    cyan:    '#00f5ff',
    purple:  '#b94fff',
    yellow:  '#ffee00',
    white:   '#ffffff',
    sky1:    '#0d001a',
    sky2:    '#1a0035',
    horizon: '#3d00a0',
  };

  // ─── State ─────────────────────────────────────────────────────────────────
  let state = 'title';   // 'title' | 'play' | 'dead'
  let score, hiScore, speed, frameCount;
  let player, obstacles, particles, stars;
  let deathFlash, deathTimer;
  let keys = {};

  hiScore = parseInt(localStorage.getItem('neonDriftHi') || '0', 10);

  // ─── Stars ─────────────────────────────────────────────────────────────────
  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random() * 0.45,
        r: Math.random() * 1.5 * SCALE + 0.5,
        b: Math.random()
      });
    }
  }

  // ─── Game Init ─────────────────────────────────────────────────────────────
  function startGame() {
    score = 0;
    speed = 4;
    frameCount = 0;
    deathFlash = 0;
    deathTimer = 0;

    // 3 lanes: 0,1,2
    player = {
      lane: 1,
      x: 0,        // computed each frame
      y: 0,
      w: 56 * SCALE,
      h: 32 * SCALE,
      moving: false,
      targetLane: 1,
      laneAnim: 0,  // 0..1 lerp progress
      glow: 0
    };

    obstacles = [];
    particles = [];
    state = 'play';
  }

  // ─── Lane helpers ──────────────────────────────────────────────────────────
  const LANE_COUNT = 3;
  function laneX(lane) {
    // Road occupies center ~60% of W
    const roadW = W * 0.72;
    const roadLeft = (W - roadW) / 2;
    const seg = roadW / LANE_COUNT;
    return roadLeft + seg * lane + seg / 2;
  }

  // ─── Input ─────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (state === 'play') {
      if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') movePlayer(-1);
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') movePlayer(1);
    }
    if (state === 'title' || state === 'dead') {
      if (e.key === ' ' || e.key === 'Enter') startGame();
    }
    e.preventDefault();
  });

  // Touch
  let touchStartX = null;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    if (state === 'title' || state === 'dead') { startGame(); return; }
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (state !== 'play' || touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 15) {
      // Tap: left half → left, right half → right
      const tx = e.changedTouches[0].clientX;
      const rect = canvas.getBoundingClientRect();
      movePlayer(tx - rect.left < W / 2 ? -1 : 1);
    } else {
      movePlayer(dx < 0 ? -1 : 1);
    }
    touchStartX = null;
  }, { passive: true });

  function movePlayer(dir) {
    const target = player.targetLane + dir;
    if (target < 0 || target >= LANE_COUNT) return;
    player.targetLane = target;
    player.moving = true;
    player.laneAnim = 0;
  }

  // ─── Obstacle spawn ────────────────────────────────────────────────────────
  const OBS_COLORS = [C.pink, C.cyan, C.purple, C.yellow];
  function spawnObstacle() {
    // pick 1 or 2 lanes blocked
    const lanesBlocked = new Set();
    const count = Math.random() < 0.3 ? 2 : 1;
    while (lanesBlocked.size < count) {
      lanesBlocked.add(Math.floor(Math.random() * LANE_COUNT));
    }
    for (const lane of lanesBlocked) {
      const col = OBS_COLORS[Math.floor(Math.random() * OBS_COLORS.length)];
      obstacles.push({
        lane,
        y: -40 * SCALE,
        w: 52 * SCALE,
        h: 28 * SCALE,
        color: col,
        dead: false
      });
    }
  }

  // ─── Particles ─────────────────────────────────────────────────────────────
  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = (Math.random() * 4 + 1) * SCALE;
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        color,
        r: (Math.random() * 3 + 1) * SCALE
      });
    }
  }

  // ─── Draw helpers ──────────────────────────────────────────────────────────
  function glow(color, blur) {
    ctx.shadowColor = color;
    ctx.shadowBlur  = blur * SCALE;
  }
  function noGlow() {
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  }

  function drawGlowText(text, x, y, color, size, blur) {
    ctx.font = `bold ${size * SCALE}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    glow(color, blur);
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
    // second pass for core
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.white;
    ctx.globalAlpha = 0.7;
    ctx.fillText(text, x, y);
    ctx.globalAlpha = 1;
    noGlow();
  }

  // ─── Background (sky + stars) ──────────────────────────────────────────────
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
    grad.addColorStop(0, C.sky1);
    grad.addColorStop(1, C.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H * 0.5);

    // Stars
    for (const s of stars) {
      const flicker = 0.5 + 0.5 * Math.sin(frameCount * 0.05 + s.b * 20);
      ctx.globalAlpha = 0.4 + 0.6 * flicker;
      glow(C.cyan, 4);
      ctx.fillStyle = C.white;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    noGlow();

    // Horizon glow
    const hGrad = ctx.createLinearGradient(0, H * 0.42, 0, H * 0.55);
    hGrad.addColorStop(0, 'rgba(180,0,255,0.0)');
    hGrad.addColorStop(0.5, 'rgba(180,0,255,0.35)');
    hGrad.addColorStop(1, 'rgba(180,0,255,0.0)');
    ctx.fillStyle = hGrad;
    ctx.fillRect(0, H * 0.42, W, H * 0.13);
  }

  // ─── Perspective grid ─────────────────────────────────────────────────────
  const HORIZON_Y_FRAC = 0.50;
  const GRID_LINES_H = 18;   // horizontal lines
  const GRID_LINES_V = 12;   // vertical lines

  function drawGrid() {
    const hy = H * HORIZON_Y_FRAC;
    const roadW = W * 0.72;
    const roadLeft = (W - roadW) / 2;

    // Fill road with gradient
    const roadGrad = ctx.createLinearGradient(0, hy, 0, H);
    roadGrad.addColorStop(0, '#10002a');
    roadGrad.addColorStop(1, '#1a003a');
    ctx.fillStyle = roadGrad;
    ctx.beginPath();
    ctx.moveTo(W * 0.5 - 30, hy);
    ctx.lineTo(W * 0.5 + 30, hy);
    ctx.lineTo(roadLeft + roadW, H);
    ctx.lineTo(roadLeft, H);
    ctx.closePath();
    ctx.fill();

    // Scanlines overlay
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let sy = hy; sy < H; sy += 3 * SCALE) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, sy, W, SCALE);
    }
    ctx.restore();

    // Horizontal grid lines (perspective)
    for (let i = 1; i <= GRID_LINES_H; i++) {
      const t = Math.pow(i / GRID_LINES_H, 1.6);
      const y = hy + (H - hy) * t;
      const xSpan = roadW * (0.04 + 0.96 * t) / 2;
      const cx    = W / 2;

      const alpha = 0.15 + 0.55 * t;
      glow(C.gridBrt, 4);
      ctx.strokeStyle = `rgba(106,0,200,${alpha})`;
      ctx.lineWidth = (0.5 + t * 1.5) * SCALE;
      ctx.beginPath();
      ctx.moveTo(cx - xSpan, y);
      ctx.lineTo(cx + xSpan, y);
      ctx.stroke();
    }

    // Vertical grid lines (perspective)
    for (let j = 0; j <= GRID_LINES_V; j++) {
      const frac = j / GRID_LINES_V;
      const xBottom = roadLeft + roadW * frac;
      const xTop    = W / 2 + (xBottom - W / 2) * 0.04;

      const distFromEdge = Math.abs(frac - 0.5) * 2;
      const alpha = 0.1 + 0.4 * distFromEdge;
      glow(C.gridBrt, 3);
      ctx.strokeStyle = `rgba(106,0,200,${alpha})`;
      ctx.lineWidth = 0.5 * SCALE;
      ctx.beginPath();
      ctx.moveTo(xTop, hy);
      ctx.lineTo(xBottom, H);
      ctx.stroke();
    }

    // Lane dividers (brighter)
    for (let l = 1; l < LANE_COUNT; l++) {
      const frac = l / LANE_COUNT;
      const xBottom = roadLeft + roadW * frac;
      const xTop    = W / 2 + (xBottom - W / 2) * 0.04;
      glow(C.purple, 8);
      ctx.strokeStyle = C.purple;
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1 * SCALE;
      ctx.setLineDash([12 * SCALE, 18 * SCALE]);
      // Animate dash offset with scroll
      ctx.lineDashOffset = -(frameCount * speed * 0.5 * SCALE) % (30 * SCALE);
      ctx.beginPath();
      ctx.moveTo(xTop, hy);
      ctx.lineTo(xBottom, H);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    noGlow();
  }

  // ─── Player car ───────────────────────────────────────────────────────────
  function drawPlayer() {
    const px = player.x;
    const py = player.y;
    const w  = player.w;
    const h  = player.h;

    ctx.save();
    ctx.translate(px, py);

    // Body
    glow(C.cyan, 18);
    ctx.fillStyle = '#001a2e';
    ctx.beginPath();
    // Sleek car shape
    ctx.moveTo(-w * 0.5, h * 0.15);
    ctx.lineTo(-w * 0.38, -h * 0.5);
    ctx.lineTo(w * 0.38, -h * 0.5);
    ctx.lineTo(w * 0.5, h * 0.15);
    ctx.lineTo(w * 0.45, h * 0.5);
    ctx.lineTo(-w * 0.45, h * 0.5);
    ctx.closePath();
    ctx.fill();

    // Neon outline
    ctx.strokeStyle = C.cyan;
    ctx.lineWidth = 1.5 * SCALE;
    glow(C.cyan, 22);
    ctx.stroke();

    // Windshield
    ctx.fillStyle = 'rgba(0,245,255,0.18)';
    glow(C.cyan, 6);
    ctx.beginPath();
    ctx.moveTo(-w * 0.28, -h * 0.1);
    ctx.lineTo(-w * 0.22, -h * 0.46);
    ctx.lineTo(w * 0.22, -h * 0.46);
    ctx.lineTo(w * 0.28, -h * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,245,255,0.6)';
    ctx.lineWidth = 0.8 * SCALE;
    ctx.stroke();

    // Headlights
    glow(C.pink, 16);
    ctx.fillStyle = C.pink;
    for (const sx of [-w * 0.32, w * 0.32]) {
      ctx.beginPath();
      ctx.ellipse(sx, -h * 0.5, 5 * SCALE, 3 * SCALE, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Taillights
    glow(C.purple, 12);
    ctx.fillStyle = C.purple;
    for (const sx of [-w * 0.3, w * 0.3]) {
      ctx.beginPath();
      ctx.ellipse(sx, h * 0.5, 5 * SCALE, 2.5 * SCALE, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Underbody glow
    const ugGrad = ctx.createRadialGradient(0, h * 0.4, 2, 0, h * 0.4, w * 0.5);
    ugGrad.addColorStop(0, 'rgba(0,245,255,0.3)');
    ugGrad.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.fillStyle = ugGrad;
    glow(C.cyan, 0);
    ctx.beginPath();
    ctx.ellipse(0, h * 0.55, w * 0.5, h * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    noGlow();
    ctx.restore();
  }

  // ─── Obstacles ─────────────────────────────────────────────────────────────
  function drawObstacle(ob) {
    const x = laneX(ob.lane);
    const y = ob.y;
    const w = ob.w;
    const h = ob.h;

    ctx.save();
    ctx.translate(x, y);

    glow(ob.color, 20);
    ctx.fillStyle = ob.color + '33';
    ctx.fillRect(-w / 2, -h / 2, w, h);

    ctx.strokeStyle = ob.color;
    ctx.lineWidth = 2 * SCALE;
    ctx.strokeRect(-w / 2, -h / 2, w, h);

    // Inner bright line
    glow(ob.color, 30);
    ctx.strokeStyle = C.white;
    ctx.lineWidth = 0.8 * SCALE;
    ctx.globalAlpha = 0.6;
    ctx.strokeRect(-w / 2 + 3 * SCALE, -h / 2 + 3 * SCALE, w - 6 * SCALE, h - 6 * SCALE);
    ctx.globalAlpha = 1;

    // Top glow bar
    ctx.fillStyle = ob.color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(-w / 2, -h / 2, w, 3 * SCALE);
    ctx.globalAlpha = 1;

    noGlow();
    ctx.restore();
  }

  // ─── Particles ─────────────────────────────────────────────────────────────
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1 * SCALE;
      p.life -= 0.025;
    }
    // filter dead
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      glow(p.color, 8);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    noGlow();
  }

  // ─── HUD ──────────────────────────────────────────────────────────────────
  function drawHUD() {
    const scoreStr = String(Math.floor(score)).padStart(6, '0');
    const hiStr    = String(hiScore).padStart(6, '0');

    ctx.font = `bold ${13 * SCALE}px 'Courier New', monospace`;
    ctx.textAlign = 'right';

    glow(C.cyan, 10);
    ctx.fillStyle = C.cyan;
    ctx.fillText('SCORE ' + scoreStr, W - 10 * SCALE, 24 * SCALE);

    glow(C.purple, 8);
    ctx.fillStyle = C.purple;
    ctx.fillText('BEST  ' + hiStr, W - 10 * SCALE, 40 * SCALE);

    noGlow();
  }

  // ─── Title Screen ──────────────────────────────────────────────────────────
  function drawTitle() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawGrid();

    // Main title
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.002);
    ctx.globalAlpha = pulse;
    drawGlowText('NEON DRIFT', W / 2, H * 0.28, C.pink, 42, 32);
    ctx.globalAlpha = 1;

    // Tagline
    ctx.font = `${11 * SCALE}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    glow(C.purple, 8);
    ctx.fillStyle = C.purple;
    ctx.fillText('SURVIVE THE INFINITE HIGHWAY', W / 2, H * 0.37);
    noGlow();

    // Draw a static car preview
    player = { x: W / 2, y: H * 0.55, w: 56 * SCALE, h: 32 * SCALE, lane: 1, targetLane: 1 };
    drawPlayer();

    // Controls hint
    const blink = Math.floor(Date.now() / 600) % 2 === 0;
    ctx.globalAlpha = blink ? 1 : 0.5;
    ctx.font = `bold ${13 * SCALE}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    glow(C.cyan, 12);
    ctx.fillStyle = C.cyan;
    ctx.fillText('TAP OR PRESS ENTER TO PLAY', W / 2, H * 0.72);
    ctx.globalAlpha = 1;
    noGlow();

    ctx.font = `${9 * SCALE}px 'Courier New', monospace`;
    ctx.fillStyle = C.purple;
    glow(C.purple, 4);
    ctx.fillText('← → ARROWS  |  A/D  |  SWIPE', W / 2, H * 0.80);
    noGlow();

    // Hi score
    if (hiScore > 0) {
      ctx.font = `${10 * SCALE}px 'Courier New', monospace`;
      ctx.fillStyle = C.yellow;
      glow(C.yellow, 8);
      ctx.fillText('BEST: ' + String(hiScore).padStart(6, '0'), W / 2, H * 0.87);
      noGlow();
    }
  }

  // ─── Death Screen ──────────────────────────────────────────────────────────
  function drawDeathScreen() {
    // Dim overlay
    ctx.fillStyle = 'rgba(10,0,20,0.82)';
    ctx.fillRect(0, 0, W, H);

    drawGlowText('GAME OVER', W / 2, H * 0.32, C.pink, 36, 28);

    ctx.font = `${13 * SCALE}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    glow(C.cyan, 8);
    ctx.fillStyle = C.cyan;
    ctx.fillText('SCORE   ' + String(Math.floor(score)).padStart(6, '0'), W / 2, H * 0.46);
    glow(C.purple, 8);
    ctx.fillStyle = C.purple;
    ctx.fillText('BEST    ' + String(hiScore).padStart(6, '0'), W / 2, H * 0.54);
    noGlow();

    // Play again button
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    ctx.globalAlpha = blink ? 1 : 0.6;
    ctx.font = `bold ${14 * SCALE}px 'Courier New', monospace`;
    glow(C.cyan, 14);
    ctx.fillStyle = C.cyan;
    ctx.fillText('[ PLAY AGAIN ]', W / 2, H * 0.68);
    ctx.globalAlpha = 1;
    noGlow();

    ctx.font = `${9 * SCALE}px 'Courier New', monospace`;
    ctx.fillStyle = C.purple;
    glow(C.purple, 4);
    ctx.fillText('TAP  /  ENTER  /  SPACE', W / 2, H * 0.75);
    noGlow();
  }

  // ─── Collision ─────────────────────────────────────────────────────────────
  function checkCollision() {
    for (const ob of obstacles) {
      const dx = Math.abs(player.x - laneX(ob.lane));
      const dy = Math.abs(player.y - ob.y);
      if (dx < (player.w + ob.w) * 0.38 && dy < (player.h + ob.h) * 0.38) {
        return ob;
      }
    }
    return null;
  }

  // ─── Update ────────────────────────────────────────────────────────────────
  function update() {
    frameCount++;
    score += speed * 0.06;
    speed  = 4 + Math.sqrt(score) * 0.28;
    if (speed > 22) speed = 22;

    // Player lane lerp
    if (player.moving) {
      player.laneAnim += 0.12;
      if (player.laneAnim >= 1) {
        player.laneAnim = 1;
        player.lane     = player.targetLane;
        player.moving   = false;
      }
    }
    const fromX = laneX(player.lane);
    const toX   = laneX(player.targetLane);
    player.x = fromX + (toX - fromX) * player.laneAnim;
    player.y = H * 0.80;

    // Spawn obstacles
    const spawnInterval = Math.max(28, 80 - Math.floor(speed * 3));
    if (frameCount % spawnInterval === 0) spawnObstacle();

    // Move obstacles
    for (const ob of obstacles) {
      ob.y += speed * SCALE * 1.1;
    }

    // Remove off-screen obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      if (obstacles[i].y > H + 50 * SCALE) obstacles.splice(i, 1);
    }

    // Spawn trail particles
    if (frameCount % 3 === 0) {
      spawnParticles(player.x, player.y + player.h * 0.4, C.cyan, 2);
    }

    updateParticles();

    // Collision check
    const hit = checkCollision();
    if (hit) {
      // save hi score
      if (Math.floor(score) > hiScore) {
        hiScore = Math.floor(score);
        localStorage.setItem('neonDriftHi', hiScore);
      }
      spawnParticles(player.x, player.y, C.pink, 40);
      spawnParticles(player.x, player.y, C.cyan, 20);
      deathFlash = 1;
      state = 'dying';
      deathTimer = 0;
    }
  }

  // ─── Main loop ─────────────────────────────────────────────────────────────
  let lastTime = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = ts - lastTime;
    lastTime = ts;

    if (state === 'title') {
      frameCount = (frameCount || 0) + 1;
      drawTitle();
      return;
    }

    if (state === 'dying') {
      deathTimer++;
      deathFlash = Math.max(0, 1 - deathTimer / 18);
      updateParticles();

      ctx.clearRect(0, 0, W, H);
      drawSky();
      drawGrid();
      drawParticles();
      drawPlayer();
      for (const ob of obstacles) drawObstacle(ob);
      drawHUD();

      // Flash overlay
      ctx.fillStyle = `rgba(255,45,120,${deathFlash * 0.7})`;
      ctx.fillRect(0, 0, W, H);

      if (deathTimer >= 55) {
        state = 'dead';
      }
      return;
    }

    if (state === 'dead') {
      ctx.clearRect(0, 0, W, H);
      drawSky();
      drawGrid();
      drawParticles();
      updateParticles();
      drawDeathScreen();
      return;
    }

    // ── PLAY ──
    update();

    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawGrid();
    drawParticles();

    // Draw obstacles behind player
    for (const ob of obstacles) {
      if (ob.y < player.y) drawObstacle(ob);
    }
    drawPlayer();
    for (const ob of obstacles) {
      if (ob.y >= player.y) drawObstacle(ob);
    }

    drawHUD();
  }

  // ─── Boot ──────────────────────────────────────────────────────────────────
  resize();
  initStars();
  frameCount = 0;
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
